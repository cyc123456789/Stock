<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日選股｜台股 × 美股</title>
<style>
  :root{
    --bg:#0f1729; --card:#1b2540; --card-2:#232f52; --accent:#ffce54;
    --green:#34d399; --red:#f87171; --blue:#60a5fa; --text:#f4f6fb;
    --muted:#9fb0d0; --border:#2e3c63; --sidebar:#141d36;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei","Helvetica Neue",Arial,sans-serif;
    font-size:19px; line-height:1.75; letter-spacing:.2px;
  }

  /* ===== 版面骨架 ===== */
  .layout{display:flex; min-height:100vh;}

  /* 左側固定欄（桌機） */
  .sidebar{
    width:220px; flex:0 0 220px; background:var(--sidebar);
    border-right:1px solid var(--border); padding:18px 12px;
    position:sticky; top:0; align-self:flex-start; height:100vh; overflow-y:auto;
  }
  .sidebar .brand{font-size:22px; font-weight:800; padding:6px 8px 4px;}
  .sidebar .brand small{display:block; color:var(--muted); font-size:14px; font-weight:600; margin-top:4px;}
  .sidebar .nav-title{color:var(--muted); font-size:14px; margin:18px 8px 8px; letter-spacing:1px;}
  .date-list{list-style:none; margin:0; padding:0;}
  .date-list li{margin:6px 0;}
  .date-list button{
    width:100%; text-align:left; cursor:pointer;
    background:transparent; color:var(--text); border:1px solid transparent;
    border-radius:10px; padding:11px 12px; font-size:17px; font-weight:700;
    font-family:inherit; transition:background .15s,border-color .15s;
  }
  .date-list button:hover{background:var(--card);}
  .date-list button.active{background:var(--card-2); border-color:var(--accent); color:var(--accent);}

  /* 右側主區 */
  .main{flex:1 1 auto; min-width:0;}
  .main-inner{max-width:820px; margin:0 auto; padding:8px 18px 60px;}

  /* 手機頂部 bar（桌機隱藏） */
  .topbar{display:none;}

  /* ===== 注入內容（沿用報告樣式） ===== */
  .content header.site{
    background:linear-gradient(135deg,#1d2a52 0%,#122046 100%);
    border-bottom:3px solid var(--accent); padding:24px 16px; text-align:center;
    border-radius:0 0 16px 16px; margin-bottom:6px;
  }
  .content header.site h1{margin:0; font-size:28px; font-weight:800; letter-spacing:1px;}
  .content header.site .sub{margin-top:8px; color:var(--muted); font-size:17px;}
  .content .wrap{max-width:none; margin:0; padding:14px 0 0;}
  .content .back-link{display:none;}
  .content h2.section{font-size:24px; margin:30px 0 14px; padding-left:12px; border-left:6px solid var(--accent);}
  .content h2.section.us{border-left-color:var(--blue);}
  .content .market-note{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:16px 18px; margin:18px 0; font-size:18px;
  }
  .content .market-note strong{color:var(--accent);}
  .content .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:18px 18px 20px; margin:16px 0; box-shadow:0 4px 18px rgba(0,0,0,.25);
  }
  .content .card .name{font-size:23px; font-weight:800; margin:0 0 4px;}
  .content .card .code{color:var(--muted); font-size:17px; font-weight:600;}
  .content .levels{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:14px 0;}
  .content .level{background:var(--card-2); border-radius:12px; padding:10px 8px; text-align:center;}
  .content .level .label{font-size:14px; color:var(--muted); display:block;}
  .content .level .val{font-size:19px; font-weight:800; margin-top:3px;}
  .content .level.buy .val{color:var(--blue);}
  .content .level.target .val{color:var(--green);}
  .content .level.stop .val{color:var(--red);}
  .content .card .reason,.content .card .risk{font-size:18px; margin:10px 0 0;}
  .content .card .reason b{color:var(--green);}
  .content .card .risk b{color:var(--red);}
  .content .disclaimer{
    margin-top:36px; padding:18px; background:#161f38; border:1px dashed var(--border);
    border-radius:12px; color:var(--muted); font-size:15px; line-height:1.7;
  }
  .content footer.site{text-align:center; color:var(--muted); font-size:14px; padding:14px 0 0;}
  .loading{padding:60px 10px; text-align:center; color:var(--muted); font-size:18px;}

  /* ===== 手機 RWD ===== */
  @media (max-width:767px){
    .sidebar{display:none;}
    .layout{display:block;}
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      position:sticky; top:0; z-index:30; background:var(--sidebar);
      border-bottom:1px solid var(--border); padding:12px 14px;
    }
    .topbar .ttl{font-size:20px; font-weight:800;}
    .topbar .hist-btn{
      background:var(--card-2); color:var(--accent); border:1px solid var(--border);
      border-radius:10px; padding:9px 14px; font-size:16px; font-weight:700;
      font-family:inherit; cursor:pointer;
    }
    .mobile-menu{
      display:none; background:var(--sidebar); border-bottom:1px solid var(--border);
      padding:8px 14px 14px; position:sticky; top:56px; z-index:25;
    }
    .mobile-menu.open{display:block;}
    .mobile-menu .date-list button{font-size:18px; padding:13px 12px;}
    .main-inner{padding:8px 14px 60px;}
    .content header.site h1{font-size:24px;}
  }
</style>
</head>
<body>
<div class="layout">

  <!-- 左側歷史導覽（桌機） -->
  <aside class="sidebar">
    <div class="brand">📈 每日選股<small>台股 × 美股｜AI 自動產生</small></div>
    <div class="nav-title">歷史紀錄（新→舊）</div>
    <ul class="date-list" id="sideList"></ul>
  </aside>

  <!-- 右側主區 -->
  <section class="main">
    <!-- 手機頂部 bar -->
    <div class="topbar">
      <span class="ttl">📈 每日選股</span>
      <button class="hist-btn" id="histBtn" aria-expanded="false">歷史紀錄 ▾</button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <ul class="date-list" id="mobileList"></ul>
    </div>

    <div class="main-inner">
      <div class="content" id="content">
        <div class="loading">載入中…</div>
      </div>
    </div>
  </section>
</div>

<script>
  // 由 build_index.sh 掃描 reports/ 後硬編碼寫入（新到舊）
  var DATES = ["2026-07-08","2026-07-07","2026-07-06","2026-07-05","2026-07-04","2026-07-03","2026-07-02","2026-07-01","2026-06-30","2026-06-29","2026-06-28","2026-06-26","2026-06-25","2026-06-24","2026-06-23","2026-06-22","2026-06-21","2026-06-20","2026-06-19"];

  var contentEl = document.getElementById('content');
  var sideList  = document.getElementById('sideList');
  var mobileList= document.getElementById('mobileList');
  var histBtn   = document.getElementById('histBtn');
  var mobileMenu= document.getElementById('mobileMenu');
  var current   = null;

  function buildList(ul){
    ul.innerHTML = '';
    DATES.forEach(function(d){
      var li = document.createElement('li');
      var b  = document.createElement('button');
      b.type = 'button';
      b.textContent = d;
      b.setAttribute('data-date', d);
      b.addEventListener('click', function(){
        load(d);
        mobileMenu.classList.remove('open');
        histBtn.setAttribute('aria-expanded','false');
      });
      li.appendChild(b);
      ul.appendChild(li);
    });
  }

  function markActive(d){
    document.querySelectorAll('.date-list button').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-date') === d);
    });
  }

  function load(d){
    if(!d) return;
    current = d;
    markActive(d);
    document.title = '每日選股 ' + d + '｜台股 × 美股';
    contentEl.innerHTML = '<div class="loading">載入中…</div>';
    fetch('reports/' + d + '.html', {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
      .then(function(html){
        var doc = new DOMParser().parseFromString(html, 'text/html');
        var body = doc.body;
        var bl = body.querySelector('.back-link');
        if(bl) bl.remove();
        contentEl.innerHTML = body.innerHTML;
        window.scrollTo(0,0);
      })
      .catch(function(){
        contentEl.innerHTML = '<div class="loading">找不到 ' + d + ' 的內容。</div>';
      });
  }

  histBtn.addEventListener('click', function(){
    var open = mobileMenu.classList.toggle('open');
    histBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  buildList(sideList);
  buildList(mobileList);
  if(DATES.length){ load(DATES[0]); }
  else { contentEl.innerHTML = '<div class="loading">尚無報告。</div>'; }
</script>
</body>
</html>
